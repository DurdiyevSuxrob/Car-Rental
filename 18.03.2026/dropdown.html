<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=Roboto+Slab:wght@100..900&display=swap');

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: "Archivo Black", sans-serif;
        }
        nav {
            width: 100%;
            height: 60px;
            box-shadow: 2px 0px 6px gray;
            display: flex;
            justify-content: space-around;
            align-items: center;
            
            font-size: 20px;
        }
        nav a {
            text-decoration: none;
            color: black;
        }
        .dropdown {
            position: relative;
            
        }
        .drop {
            background-color: black;
            color: snow;
            position: absolute;
            display: none;
        }
        .drop p {
            padding: 0px 30px;
        }
        .drop p:hover {
            background-color: blue;
        }
        .dropdown:hover .drop {
            display: block;
        }
    </style>
</head>
<body>
    <nav>
        <div class="dropdown">
            <a href="#">Kompaniya</a>
            <div class="drop">
                <p>Uzauto motors</p>
                <p>Lorem, ipsum.</p>
                <p>Lorem, ipsum.</p>
                <p>Lorem, ipsum.</p>
            </div>
        </div>

        <a href="#">Komplayens</a>
        <a href="#">Avtomobillar</a>

    </nav>
</body>
</html>
